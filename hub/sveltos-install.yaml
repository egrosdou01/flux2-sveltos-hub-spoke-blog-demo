apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: sveltos-install
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 3m
  timeout: 10m
  prune: true
  wait: true
  path: ./hub/sveltos/install
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
