apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: sveltos-clusters
  namespace: flux-system
spec:
  dependsOn:
    - name: sveltos-install
  interval: 1h
  retryInterval: 3m
  timeout: 5m
  prune: true
  wait: true
  path: ./clusters/sveltos-clusters
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
