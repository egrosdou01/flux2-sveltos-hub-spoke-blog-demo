---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: traefik
spec:
  interval: 24h
  url: https://traefik.github.io/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
spec:
  targetNamespace: traefik
  storageNamespace: traefik
  releaseName: traefik
  interval: 30m
  chart:
    spec:
      chart: traefik
      version: "40.x"
      sourceRef:
        kind: HelmRepository
        name: traefik
      interval: 12h
  install:
    createNamespace: true
    strategy:
      name: RetryOnFailure
  values:
    service:
      type: NodePort
    logs:
      access:
        enabled: true
